name: HairCare CI

# Запуск при кожному push або pull request у гілку master [cite: 3857]
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3 # Клонування репозиторію [cite: 3857]

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' # Версія Python для вашого проекту

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # Встановлення залежностей із вашого файлу [cite: 3857]

    - name: Run Django Tests
      run: |
        python manage.py test # Автоматичний запуск тестів із haircare_app/tests.py [cite: 3857]
